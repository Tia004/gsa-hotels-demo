<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GSA Hotels | Accedi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold: #C5A059;
            --gold-light: #d4b57a;
            --bg: #080808;
            --bg-card: rgba(10, 10, 10, 0.92);
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
        }

        /* ── Animated golden ambient background ── */
        .bg-ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .bg-ambient::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(197,160,89,0.12) 0%, transparent 70%);
            top: -150px; left: -150px;
            animation: drift1 18s ease-in-out infinite alternate;
        }
        .bg-ambient::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(197,160,89,0.08) 0%, transparent 70%);
            bottom: -100px; right: -100px;
            animation: drift2 22s ease-in-out infinite alternate;
        }
        @keyframes drift1 { 0%{transform:translate(0,0)} 100%{transform:translate(60px,80px)} }
        @keyframes drift2 { 0%{transform:translate(0,0)} 100%{transform:translate(-50px,-60px)} }

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border: 1px solid rgba(197,160,89,0.18);
            border-radius: 20px;
            padding: 48px 44px 40px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 40px 80px rgba(0,0,0,0.6),
                0 0 60px rgba(197,160,89,0.05);
        }

        .card-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
        }
        .card-logo img { height: 36px; width: auto; }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2rem;
            font-weight: 300;
            color: #fff;
            text-align: center;
            letter-spacing: 0.04em;
            margin-bottom: 4px;
        }
        .card-subtitle {
            font-size: 0.72rem;
            text-align: center;
            color: rgba(255,255,255,0.35);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        .gold-line {
            width: 48px; height: 1px;
            background: var(--gold);
            margin: 0 auto 28px;
            opacity: 0.5;
        }

        #clerk-sign-in {
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .clerk-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            color: rgba(255,255,255,0.3);
            font-size: 0.72rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }
        .spinner {
            width: 28px; height: 28px;
            border: 2px solid rgba(197,160,89,0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .card-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
        }
        .card-footer a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .card-footer a:hover { color: var(--gold-light); }

        .back-link {
            position: fixed;
            top: 2rem; left: 2rem;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255,255,255,0.4);
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            transition: color 0.2s;
        }
        .back-link:hover { color: rgba(255,255,255,0.8); }
        .back-link svg { width: 14px; height: 14px; }
    </style>
</head>
<body>

    <div class="bg-ambient"></div>

    <a href="index.html" class="back-link">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Torna al sito
    </a>

    <div class="card">
        <div class="card-logo">
            <img src="assets/logo.png" alt="GSA Hotels" onerror="this.style.display='none'">
        </div>
        <h1 class="card-title">Bentornato</h1>
        <p class="card-subtitle">Accedi al portale GSA Hotels</p>
        <div class="gold-line"></div>

        <div id="clerk-sign-in">
            <div class="clerk-loading">
                <div class="spinner"></div>
                <span>Caricamento...</span>
            </div>
        </div>

        <p class="card-footer">
            Non hai un account? <a href="register.html">Registrati</a>
        </p>
    </div>

    <!--
    ╔══════════════════════════════════════════════════════╗
    ║  ISTRUZIONI CLERK                                    ║
    ║  1. Vai su dashboard.clerk.com → il tuo progetto     ║
    ║  2. API Keys → copia la "Publishable Key"            ║
    ║     (inizia con pk_test_... oppure pk_live_...)       ║
    ║  3. Incollala al posto di YOUR_CLERK_PUBLISHABLE_KEY ║
    ╚══════════════════════════════════════════════════════╝
    -->
    <script>
        window.addEventListener('load', async function () {
            await loadClerk();
        });

        async function loadClerk() {
            // ⚠️ Inserisci qui la tua Publishable Key di Clerk
            const PUBLISHABLE_KEY = 'pk_test_Z3Jvd24temVicmEtMzguY2xlcmsuYWNjb3VudHMuZGV2JA';

            try {
                if (PUBLISHABLE_KEY.includes('YOUR_CLERK')) throw new Error('not configured');

                // Load Clerk SDK Script
                const script = document.createElement('script');
                script.setAttribute('data-clerk-publishable-key', PUBLISHABLE_KEY);
                script.async = true;
                script.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
                script.crossOrigin = 'anonymous';

                script.onload = async () => {
                    try {
                        const clerk = window.Clerk;
                        await clerk.load();

                        // Already signed in → go to dashboard
                        if (clerk.user) {
                            window.location.href = 'dashboard.html';
                            return;
                        }

                        clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
                            afterSignInUrl: 'dashboard.html',
                            afterSignUpUrl: 'dashboard.html',
                            appearance: {
                                variables: {
                                    colorPrimary: '#C5A059',
                                    colorBackground: '#0a0a0a',
                                    colorInputBackground: '#111111',
                                    colorText: '#ffffff',
                                    colorTextSecondary: 'rgba(255,255,255,0.5)',
                                    colorInputText: '#ffffff',
                                    borderRadius: '10px',
                                    fontFamily: 'Montserrat, sans-serif',
                                },
                                elements: {
                                    card: 'background: transparent; box-shadow: none; border: none;',
                                    headerTitle: 'display: none;',
                                    headerSubtitle: 'display: none;',
                                    socialButtonsBlockButton: 'border: 1px solid rgba(197,160,89,0.3); background: rgba(197,160,89,0.05);',
                                    formButtonPrimary: 'background: #C5A059; color: #000; font-weight: 700; letter-spacing: 0.08em;',
                                    footerActionLink: 'color: #C5A059;',
                                }
                            }
                        });
                    } catch (err) {
                        console.error('Clerk Mount Error:', err);
                        showError("Errore durante l'inizializzazione dell'interfaccia Clerk.");
                    }
                };

                script.onerror = () => {
                    showError("Impossibile caricare Clerk JS. Controlla la connessione o eventuali adblocker.");
                };

                document.head.appendChild(script);

            } catch (err) {
                showError("Clerk non configurato.<br>Sostituisci <code style='color:#C5A059;'>YOUR_CLERK_PUBLISHABLE_KEY</code> nel file <strong>login.html</strong>");
            }
        }

        function showError(msg) {
            document.getElementById('clerk-sign-in').innerHTML = `
                <div style="text-align:center; color:rgba(255,255,255,0.4); font-size:0.8rem; line-height:2; padding: 20px 0;">
                    <p style="font-size:1.5rem; margin-bottom:8px;">🔑</p>
                    <p>${msg}</p>
                </div>`;
        }
    </script>
</body>
</html>
