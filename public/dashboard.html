<!DOCTYPE html>
<html class="dark" lang="it">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>GSA Hotels - Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <style>
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top: 3px solid #f2ca50;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="bg-[#0d1322] text-white font-body flex items-center justify-center min-h-screen">
    <div id="loader" class="flex flex-col items-center space-y-4">
        <div class="loader"></div>
        <p class="text-slate-500 text-sm tracking-widest uppercase animate-pulse">Caricamento Dashboard...</p>
    </div>

    <!-- CLERK AUTH CHECK -->
    <script>
        (async function () {
            try {
                // Fetch the key dynamically from Vercel's environment variables
                const res = await fetch('/api/clerk-key');
                const data = await res.json();
                const PUBLISHABLE_KEY = data.key;

                if (!PUBLISHABLE_KEY) {
                    document.getElementById('loader').innerHTML = `
                        <p class="text-error uppercase tracking-widest text-sm">Clerk non configurato</p>
                        <p class="text-slate-500 text-xs mt-2">Nessuna variabile NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY trovata su Vercel</p>`;
                    return;
                }

            const script = document.createElement('script');
            script.setAttribute('data-clerk-publishable-key', PUBLISHABLE_KEY);
            script.async = true;
            script.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js';
            script.crossOrigin = 'anonymous';

            script.onload = async () => {
                try {
                    const clerk = window.Clerk;
                    await clerk.load();

                    if (!clerk.user) {
                        window.location.replace('login.html');
                        return;
                    }

                    // Clerk users can have publicMetadata or unsafeMetadata storing their 'tier'
                    // By default, if not set, they are 'free'
                    const tier = clerk.user.publicMetadata?.tier || clerk.user.unsafeMetadata?.tier || 'free';

                    if (tier === 'gold') {
                        window.location.replace('dashboard-gold.html');
                    } else if (tier === 'standard') {
                        window.location.replace('dashboard-standard.html');
                    } else {
                        window.location.replace('dashboard-free.html');
                    }
                } catch (e) {
                    window.location.replace('login.html');
                }
            };
            document.head.appendChild(script);
            } catch(error) {
               console.error(error);
            }
        })();
    </script>
</body>

</html>
